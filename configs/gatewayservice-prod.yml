spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true # 啟用服務發現
          lower-case-service-id: true # 服務 ID 轉換為小寫
      httpclient:
        connect-timeout: 5000       # 連線 timeout
        response-timeout: 10s       # 回應 timeout
      routes:
        - id: nexusbot
          uri: lb://nexusbot
          predicates:
            - Path=/api/linebot/**
          filters:
            - StripPrefix=2 # 去掉 /api/linebot 前綴
        - id: nexusbot-test
          uri: lb://nexusbot-test
          predicates:
            - Path=/api/linebot-test/**
          filters:
            - StripPrefix=2 # 去掉 /api/linebot-test 前綴

eureka:
  instance:
    prefer-ip-address: true
    ip-address: ${SERVER_HOST:127.0.0.1}
  client:
    service-url:
      defaultZone: http://${EUREKA_SERVER_HOST:127.0.0.1}:${EUREKA_SERVER_PORT:8761}/eureka/ # Eureka 服務地址

management:
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}   # 全取樣；流量大時透過環境變數調降
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://tempo:4318/v1/traces}

logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%-5level) [%clr(%t){faint}] [%clr(%X{traceId:-}){magenta}] [%clr(%X{spanId:-}){blue}] [%clr(%logger){cyan}] %m%n%wEx"
  level:
    root: INFO
    org.springframework.security: WARN